site_name: AVM Lab Specifications
site_description: AVM Lab specifications and research
site_author: Jonathan Prieto-Cubides
site_dir: build/site
site_url: https://anoma.github.io/avm-lab/specs/
edit_uri: edit/main/specs/docs/
repo_url: https://github.com/anoma/avm-lab
repo_name: anoma/avm-lab
docs_dir: docs/

theme:
  name: material
  logo: assets/logo.svg
  icon:
    repo: fontawesome/brands/github
  palette:
    scheme: default
    primary: black
    accent: black
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    # - navigation.instant
    # - navigation.instant.prefetch
    # - navigation.instant.preview
    # - navigation.instant.progress
    # - navigation.expand
    # - navigation.path
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
    # - toc.integrate

plugins:
  - search
  - glightbox
  - tags
  - kroki:
      ServerURL: https://kroki.io
      FileTypes:
        - svg
  - agda:
      # agda_config_dir: .agda  # Project-local Agda library configuration
      cache_dir: build/agda-cache
      # force_rebuild: true
      include_css: true
      highlight_code_only: false
      auto_generate_index: true
      index_file_name: everything.lagda.md
      generate_datatype_index: true
      datatype_index_filename: agda-datatypes.md
      generate_function_index: true
      function_index_filename: agda-functions.md
      generate_usage_index: true
      usage_index_filename: agda-usage.md
      generate_references_section: true
      show_module_references: true
      show_backreferences: true
      show_forward_references: true
      verbose: true
      include_paths:
        - agda-libraries/agda-stdlib/
        - agda-libraries/cubical/
      # Link verification (post-build, can be slow for large sites)
      verify_links: false
      verify_anchors: false
      verify_assets: false
      fail_on_broken_links: false
  - bibtex:
      bib_file: "references/ref.bib"

markdown_extensions:
  - meta
  - toc:
      toc_depth: 3
  - pymdownx.highlight:
      use_pygments: true
      pygments_lang_class: true
      line_spans: __ispan
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.magiclink
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - def_list
  - footnotes
  - mdx_truly_sane_lists:
      nested_indent: 2
      truly_sane: true
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: true
  - pymdownx.tabbed:
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
      alternate_style: true

extra_css:
  - stylesheets/agda.css
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js
  - javascripts/extra.js

use_directory_urls: false

copyright: 2025-∞ <a href="https://anoma.github.io">Anoma Research Topics</a>

# Development-specific settings
watch:
  - docs/
  - assets/
  - mkdocs.yml
  - pyproject.toml

strict: false

nav:
  - ./index.md
  - ./About.md
  - Core Specification:
      - AVM Core Specification: ./AVM/index.md
      - System Model: ./AVM/SystemModel.md
      - Runtime Context: ./AVM/Context.lagda.md
      - Instruction Set: ./AVM/Instruction.lagda.md
      - Interpreter: ./AVM/Interpreter.lagda.md
      - Runtime Guidance: ./AVM/Runtime.md
  - Examples:
      - AVM Programs: ./examples/index.md
      - Ping-Pong Protocol:
          - Example: ./examples/PingPong/Main.lagda.md
          - Runner: ./examples/PingPong/Runner.lagda.md
      - Utilities:
          - Runner Utilities: ./examples/RunnerUtilities.lagda.md
  - Background:
      - Background: ./Background/index.md
      - Basic Types: ./Background/BasicTypes.lagda.md
      - Interaction Trees: ./Background/InteractionTrees.lagda.md
      - Objects: ./Background/Objects.lagda.md
      - Stateless Objects: ./Background/StatelessObjects.lagda.md
  - References:
      - Related Discussions: ./References.md
      - Module Index: ./everything.lagda.md
      - Tags: ./tags.md
